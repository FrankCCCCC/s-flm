name: eflm
diffusion_type: euclidean
backbone: sphere-dit
parameterization: mean
time_conditioning: True
loss_type: ce
T: 0
causal_attention: False
adaLN: True
slerp_precision: float64
eps: 1e-6

invert_time_convention: true  # true: alpha_t=1 is noisy (matches SFM). false: MDLM-like (required for adaptive noise schedule).
renormalize_weights: False    # raw Euclidean embeddings; do NOT project weights onto the sphere
prior_cov: 1.0                # variance of the Gaussian prior z ~ N(0, prior_cov*I); 1.0 matches q_xt's N(0,I) noise

self_conditioning: false      # LangFlow-style self-conditioning (2-pass, zero-init W_in/W_sc)
p_self_cond: 0.25             # train-time self-cond probability
